services:
  - type: web
    name: stockmanagement
    runtime: node
    plan: free
    buildCommand: npm install && NODE_ENV=production npm run build
    startCommand: npx tsx server/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockmanagement-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: stockmanagement-db
    databaseName: stockmanagement
    plan: free
