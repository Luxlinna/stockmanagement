services:
  - type: web
    name: stockmanagement
    runtime: node
    plan: free
    buildCommand: npm install && rm -rf .vite out && NODE_ENV=production npm run build
    startCommand: npx tsx server/index.ts
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
